name: Merge

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/merge'
    steps:
      - uses: actions/checkout@v6

      - name: Determine affected GAP directory
        id: gap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only)
          DIRS=$(echo "$CHANGED_FILES" | grep -oE '^gaps/GAP-[0-9]+' | sort -u)

          if [ -z "$DIRS" ]; then
            echo "::error::PR does not touch any GAP directory."
            exit 1
          fi

          DIR_COUNT=$(echo "$DIRS" | wc -l)
          if [ "$DIR_COUNT" -ne 1 ]; then
            echo "::error::PR touches multiple GAP directories. Author merge only works for single-GAP PRs."
            exit 1
          fi

          GAP_DIR="$DIRS"
          NON_GAP_FILES=$(echo "$CHANGED_FILES" | grep -v "^${GAP_DIR}/" || true)
          if [ -n "$NON_GAP_FILES" ]; then
            echo "::error::PR modifies files outside of $GAP_DIR — author merge not permitted."
            exit 1
          fi

          echo "gap_dir=$GAP_DIR" >> "$GITHUB_OUTPUT"

      - name: Check actor is an author or sponsor
        env:
          GAP_DIR: ${{ steps.gap.outputs.gap_dir }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          METADATA="${GAP_DIR}/metadata.yml"
          AUTHORS=$(yq '.authors[].githubUsername | sub("^@", "")' "$METADATA")
          SPONSOR=$(yq '.sponsor | sub("^@", "")' "$METADATA")
          ALL_AUTHORIZED=$(printf '%s\n%s' "$AUTHORS" "$SPONSOR" | sort -u)

          if ! echo "$ALL_AUTHORIZED" | grep -qFx "$ACTOR"; then
            echo "::error::$ACTOR is not listed as an author or sponsor in $METADATA"
            exit 1
          fi

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --auto
