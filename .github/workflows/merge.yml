name: Merge

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/merge'
    steps:
      - uses: actions/checkout@v6

      - name: Resolve authors from metadata
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only)
          GAP_DIR=$(echo "$CHANGED_FILES" | grep -oE '^gaps/GAP-[0-9]+' | sort -u | head -1)
          echo "gap_dir=$GAP_DIR" >> "$GITHUB_OUTPUT"
          echo "authors=$(yq -o=json '.authors[].githubUsername | sub("^@", "")' "$GAP_DIR/metadata.yml" | jq -sc '.')" >> "$GITHUB_OUTPUT"
          echo "sponsor=$(yq '.sponsor | sub("^@", "")' "$GAP_DIR/metadata.yml")" >> "$GITHUB_OUTPUT"

      - name: Verify actor is authorized
        uses: actions/github-script@v7
        env:
          ACTOR: ${{ github.event.comment.user.login }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GAP_DIR: ${{ steps.metadata.outputs.gap_dir }}
          AUTHORS: ${{ steps.metadata.outputs.authors }}
          SPONSOR: ${{ steps.metadata.outputs.sponsor }}
        with:
          script: |
            const { ACTOR, PR_NUMBER, GAP_DIR, AUTHORS, SPONSOR } = process.env;
            const authorized = new Set([...JSON.parse(AUTHORS), SPONSOR]);

            if (!authorized.has(ACTOR)) {
              core.setFailed(`${ACTOR} is not listed as an author or sponsor in ${GAP_DIR}/metadata.yml`);
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              ...context.repo,
              pull_number: Number(PR_NUMBER),
            });
            const paths = files.map(f => f.filename);
            const gaps = [...new Set(paths.map(p => p.match(/^gaps\/GAP-\d+/)?.[0]).filter(Boolean))];

            if (gaps.length === 0) {
              core.setFailed('PR does not touch any GAP directory.');
              return;
            }
            if (gaps.length !== 1) {
              core.setFailed('PR touches multiple GAP directories.');
              return;
            }
            if (paths.some(p => !p.startsWith(`${gaps[0]}/`))) {
              core.setFailed(`PR modifies files outside of ${gaps[0]}.`);
              return;
            }

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --auto
